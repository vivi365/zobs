name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install deps
        run: uv sync --extra dev
      - name: Format check
        run: uv run black --check .
      - name: Tests
        run: uv run pytest
